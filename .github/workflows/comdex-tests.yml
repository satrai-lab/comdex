name: ComDeX FastAPI Tests

on:
  push:
    branches:
      - fastapi-ngsild-gateway-ci

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Mosquitto brokers
        run: docker compose up -d

      - name: Wait for MQTT brokers
        run: |
          python - <<'PY'
          import socket
          import time

          for port in (1889, 1890):
              deadline = time.time() + 30
              while time.time() < deadline:
                  try:
                      with socket.create_connection(("127.0.0.1", port), timeout=1):
                          print(f"broker on port {port} is ready")
                          break
                  except OSError:
                      time.sleep(1)
              else:
                  raise SystemExit(f"broker on port {port} did not become ready")
          PY

      - name: Run integration unittest suite
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Show broker logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop brokers
        if: always()
        run: docker compose down
